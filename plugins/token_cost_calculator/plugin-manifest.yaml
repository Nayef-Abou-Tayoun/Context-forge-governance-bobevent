name: TokenCostCalculatorPlugin
version: 1.0.0
description: Calculates and displays token costs for tool and prompt operations
author: ContextForge Team
available_hooks:
  - prompt_pre_fetch
  - prompt_post_fetch
  - tool_pre_invoke
  - tool_post_invoke
config_schema:
  type: object
  properties:
    cost_per_token:
      type: number
      default: 0.000001
      description: Cost per token in USD
    display_in_metadata:
      type: boolean
      default: true
      description: Whether to add cost information to metadata

